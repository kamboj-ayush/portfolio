<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(99, 102, 241, 0.1);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(168, 85, 247, 0.1);stop-opacity:1" />
    </linearGradient>
    
    <!-- Pattern for background -->
    <pattern id="dots" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="2" fill="#1a1a1a"/>
      <circle cx="75" cy="75" r="2" fill="#1a1a1a"/>
    </pattern>
  </defs>
  
  <!-- Background with pattern -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Main Card -->
  <rect x="100" y="100" width="1000" height="430" rx="24" fill="url(#cardGradient)" stroke="#6366f1" stroke-width="2" opacity="0.9"/>
  
  <!-- Name -->
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">
    Pawan Tripathi
  </text>
  
  <!-- Role -->
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="36" font-weight="500" fill="#e5e7eb" text-anchor="middle">
    Senior Software Engineer
  </text>
  
  <!-- Company & Experience -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="24" fill="#9ca3af" text-anchor="middle">
    <tspan fill="#6366f1">@</tspan> Nihilent Ltd. <tspan fill="#a855f7">•</tspan> 3+ Years Experience
  </text>
  
  <!-- Email -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="22" fill="#6b7280" text-anchor="middle">
    <tspan fill="#6366f1">✉</tspan> pawantripathi648@gmail.com
  </text>
  
  <!-- Tagline -->
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">
    Building modern web experiences with React, Next.js & Three.js
  </text>
  
  <!-- Footer Badge -->
  <rect x="1010" y="540" width="140" height="50" rx="12" fill="rgba(99, 102, 241, 0.1)" stroke="rgba(99, 102, 241, 0.2)" stroke-width="1"/>
  <text x="1080" y="572" font-family="Arial, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">
    Portfolio 2024
  </text>
</svg>
